x-backend-environment: &backend-environment
  APP_NAME: ${APP_NAME:-Discerne}
  APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Warsaw}
  HTTP_ADDRESS: :8080
  DEVICE_COOKIE_NAME: ${DEVICE_COOKIE_NAME:-discerne_device}
  SECURE_COOKIES: ${SECURE_COOKIES:-false}
  DATABASE_URL: postgres://${POSTGRES_USER:-discerne}:${POSTGRES_PASSWORD:-discerne}@postgres:5432/${POSTGRES_DB:-discerne}?sslmode=disable
  DISTRACTOR_BASE_WEIGHT: ${DISTRACTOR_BASE_WEIGHT:-10}
  DISTRACTOR_SAME_FAMILY_WEIGHT: ${DISTRACTOR_SAME_FAMILY_WEIGHT:-4}
  DISTRACTOR_SAME_GROUP_WEIGHT: ${DISTRACTOR_SAME_GROUP_WEIGHT:-8}
  DISTRACTOR_SAME_SUBGROUP_WEIGHT: ${DISTRACTOR_SAME_SUBGROUP_WEIGHT:-16}
  DISTRACTOR_SAME_CONTINENT_WEIGHT: ${DISTRACTOR_SAME_CONTINENT_WEIGHT:-3}
  DISTRACTOR_SAME_SCRIPT_WEIGHT: ${DISTRACTOR_SAME_SCRIPT_WEIGHT:-5}
  RATE_LIMIT_MUTATION_REQUESTS: ${RATE_LIMIT_MUTATION_REQUESTS:-30}
  RATE_LIMIT_MUTATION_WINDOW: ${RATE_LIMIT_MUTATION_WINDOW:-1m}

x-backend-service: &backend-service
  image: discerne-backend:local
  build:
    context: .
    dockerfile: backend/Dockerfile
  depends_on:
    postgres:
      condition: service_healthy
  environment: *backend-environment

services:
  postgres:
    image: postgres:17-alpine
    container_name: discerne-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discerne}
      POSTGRES_USER: ${POSTGRES_USER:-discerne}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-discerne}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    <<: *backend-service
    container_name: discerne-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: discerne-frontend:local
    container_name: discerne-frontend
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  migrate:
    <<: *backend-service
    profiles: ["tools"]
    command: ["sh", "-c", "./bin/goose -dir ./migrations postgres \"$${DATABASE_URL}\" up"]

  seed-import:
    <<: *backend-service
    profiles: ["tools"]
    command: ["./bin/seed-import"]

  quiz-generator:
    <<: *backend-service
    profiles: ["tools"]
    command: ["./bin/quiz-generator", "--days", "7"]

  quiz-ensure-future:
    <<: *backend-service
    profiles: ["tools"]
    command: ["./bin/quiz-generator", "--ensure-future", "7", "--generate-days", "30"]

  data-validator:
    <<: *backend-service
    profiles: ["tools"]
    command: ["./bin/data-validator"]

volumes:
  postgres-data:
