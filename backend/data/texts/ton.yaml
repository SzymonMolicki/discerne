language: ton
texts:
  - content: "Ko e hńĀ  Ľoku  Ľata ĽatńĀ ai  Ľa e sea  Ľi he ve Ľe matapńĀ?  ĽOku kei mńĀfana  Ľa e ipu inu.  ĽOku to  Ľa e maama vaivai ki he fala."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Na Ľe  Ľikai ke u tuku  Ľa e me Ľa fua  Ľi he puha. Na Ľe  Ľi loto pńď ha konga pepa molŇę."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Fakama Ľa  Ľa e laulau pea fakafoki  Ľa e ngaahi peleti ki he funga fata.  ĽOua  Ľe tuku  Ľa e ipu ofi ki he tapa."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Kapau  Ľe mńĀlie ange  Ľa e  Ľea efiafi, te tau fakaava  Ľa e matapńĀ ki mui.  ĽE  Ľalu mńĀmńĀlie  Ľa e nanamu vela."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Na Ľe fa Ľo  Ľa e tohi nounou ki he  Ľuufi pepa. Na Ľe toki tuku ia  Ľi he loto kato. Na Ľe kei mńĀlohi  Ľa e lńępine  Ľi tu Ľa."
    sentence_count: 3
    license: "Project-owned"
    approved: true
