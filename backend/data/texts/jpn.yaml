language: jpn
texts:
  - content: "この音は換気扇から出ているのだろうか。台所の空気はまだ少し湿っている。湯気は天井の近くで薄く消えた。"
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "約束の紙はどこにも見つからなかった。棚の上には、古い封筒だけが残っていた。"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "電池を替えれば、この小さな時計はまた動くだろう。針の音も少し明るく聞こえるかもしれない。"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "机の端で、消しゴムのかすが小さく丸まっていた。窓から入る風が紙を少し動かした。"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "静かな読書室で、椅子が一つだけ机から離れていた。誰かが忘れたしおりが本の間に見えた。蛍光灯の音が低く続いた。"
    sentence_count: 3
    license: "Project-owned"
    approved: true
