language: ful
texts:
  - content: "Hol ko waɗi fitila suka nde yiƴa no feewi? Deftere ndee udditii e dow leeso. Henndu seeɗa naatiri e damal."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Mi yi'aali coktirgal gamol ngal e nder lefol. Ko leppi ndaneeri tan heddii ɗoo."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "So ndiyam yamiro, laawol ngol hoyata ko yaawi. Paɗe ɗee njogoraani leydi heewndi."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "So windorde ndee udditaake, suudu nduu ɓeydata ɗuɗɗude. Lekki ɗii maa ndaroto no moƴƴi."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Kikiiɗe, suudu deftere ndee urni e laaci. Kaɓirgal suka ngal darii e sera. Dande ndee woni no newi."
    sentence_count: 3
    license: "Project-owned"
    approved: true
