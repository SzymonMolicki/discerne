  - content: "Mun na fitin…õnin b…õ wuli ka bila k…în…î? Gafe min b…õ tabali kan, a daf…õ ye s…õb…õn fura ye. F…î…≤…î b…õ farafin…õ min…õ ka taa."
    sentence_count: 3
