  - content: "N ma kilisi k…îr…î ye sanf…õla k…în…î. B…îr…î caman d…îr…în tun b…õ yen, nka kunko t…õ siran."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Ni ji b…õ d…îg…îya, min…õn b…õna ja ka teliya. O waati la, fini b…õ se ka bila k…õn…õ ma."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Finimuguw ye ko ka bila sogonkun kan. O k…î, u ye laj…õ ka k…õ t…îg…îw ye."
    sentence_count: 2
