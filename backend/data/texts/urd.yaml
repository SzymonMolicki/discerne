language: urd
texts:
  - content: "چھوٹی پلیٹ کھڑکی کے پاس کیوں رکھی ہے؟ کمرے میں ہلکی سی روشنی ہے۔ میز پر خشک پتے پڑے ہیں۔"
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "میں نے پرانا قلم دراز میں نہیں رکھا تھا۔ اندر صرف ایک مڑی ہوئی رسید پڑی تھی۔"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "کپڑے آہستہ سے تہ کرو اور گیلے جوتے دروازے سے دور رکھو۔ فرش پر پانی نہ چھوڑو۔"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "اگر چائے کچھ دیر اور دم لے، تو ذائقہ نرم ہو جائے گا۔ پھر ہم اسے چھوٹے کپوں میں ڈالیں گے۔"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "لکڑی کا ڈبہ احتیاط سے کھولا گیا۔ بیج ایک صاف پیالے میں ڈالے گئے۔ ڈھکن واپس لگا دیا گیا۔"
    sentence_count: 3
    license: "Project-owned"
    approved: true
