texts:
  - content: "Aeo gona dogin an light eken edorer? Book ean open eij epo table. Earo eko ngabuna curtain."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Nga ma dogin key etubwa me box. Eken cloth eab wora eij mwea."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Washim cup eken slowly me putim again epo shelf. Then wipe water mark epo tray."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "If rain eko stop, path eko dry quick. Shoe eko no carry much mud."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Evening, kitchen eko smell tea warm. Small pot eij near stove. House eko quiet slowly."
    sentence_count: 3
    license: "Project-owned"
    approved: true
