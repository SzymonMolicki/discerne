language: ina
texts:
  - content: "Proque le parve candela tremula juxta le fenestra? Un quaderno aperte jace sur le tabula. Le cortina se move multo lentemente."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Io non trovava le clave vetule in le cassa. Intra restava solmente un filo blanc e curte."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Lava le cuppas con attention e retorna los al planca. Postea sicca le marcas de aqua sur le tabuliero."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Si le pluvia cessarea, le corte devenirea sic plus tosto. Le sapatos portarea minus de fango."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Al vespere, le cucina fragrava de the calide. Un paniero vacue stava presso le porta. Le silentio cresceva lentemente."
    sentence_count: 3
    license: "Project-owned"
    approved: true
