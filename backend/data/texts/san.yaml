language: san
texts:
  - content: "किमर्थं लघुदीपः वातायनसमीपे कम्पते? पुस्तिका उपरि पीठे उद्घाटिता अस्ति। आवरणं शनैः चलति।"
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "अहं जीर्णां कुञ्चिकां पेटिकायां न अलभे। अन्तः केवलं ह्रस्वं श्वेतसूत्रं स्थितम्।"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "पात्राणि शनैः प्रक्षाल्य पुनः निधाने स्थापय। ततः जलचिह्नानि फलकेन मार्जय।"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "यदि वर्षा विरमेत्, आङ्गणं शीघ्रं शुष्कं स्यात्। उपानहौ बहु कर्दमं न गृहीयाताम्।"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "सायंकाले पाकशालायां उष्णचायस्य गन्धः आसीत्। लघुपात्रं अग्निसमीपे स्थितम्। गृहं शनैः निःशब्दम् अभवत्।"
    sentence_count: 3
    license: "Project-owned"
    approved: true
