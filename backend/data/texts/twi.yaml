texts:
  - content: "Ad…õn nti na kanea ketewa no da so rehyer…õn w…î pono no ho? Mframa b…î f…õf…õ…õf…õ. Krataa fitaa bi gu fam."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Mannya safe dedaw no w…î adaka no mu. Mede me nsa kaa ahama tuntum ketewa bi nko ara."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Fa kuruwa no to baabi a …õh…î y…õ d…õ na pepa nsu no. Mma mmofra no mfa w…în nan nnantew w…î h…î."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "S…õ osu no gyae an…îpa a, ntama no b…õwo nt…õm. Y…õb…õtumi de apampam no asie akyiri yi."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "W…îkyer…õw as…õm tiawa no w…î krataa tuntum so. Afei w…îbob…î…î no br…õoo. W…îde hy…õ…õ nhoma ketewa no mu."
    sentence_count: 3
    license: "Project-owned"
    approved: true
