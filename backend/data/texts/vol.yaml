language: vol
texts:
  - content: "Kikodo lüm smalik liton su tab? Fenät binon seimik open. Buk smalik stanon len glas."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "No ekömon yegil bäledik in bög. Inan binon te strin vietik e papür smalik."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Pükolös potis sofiko e pladols ons su stof. No pladols glas nilü röf."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "If vent seimik stüpik, klots seikon vifikumo. Pos atos, cem kanon smelön gudikumo."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Not smalik pewriton su papür vietik. Posao papür pefoldon sofiko. Pen binon nog su tab."
    sentence_count: 3
    license: "Project-owned"
    approved: true
