language: rus
texts:
  - content: "Кто оставил мокрые кисти рядом с раковиной? Краска стекала тонкими полосами, пока вода становилась мутной. На плитке лежала серая тряпка."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Я не смог открыть тугую банку с вареньем. Крышка скользила в полотенце, а чай уже остывал."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Если бы батарея грела слабее, цветы на окне не сохли бы так быстро. Воздух оставался бы мягче."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "За тонкой стеной слышался короткий смех. Потом чайник щёлкнул, и квартира снова стала тихой."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "В кладовой пахло крупой и сухими травами. На нижней полке стоял глиняный кувшин. Ручка была холодной на ощупь."
    sentence_count: 3
    license: "Project-owned"
    approved: true
