language: mah
texts:
  - content: "Etke kōn in kilal eo ej wūjleplep iturin window? Bok eo ej bellok ioon tebol. Anij eo edik ej kōmman an curtain eo rūk."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Ij jab loe key eo etto ilo box eo. Iloan ej pād wōt juon pinje eo mouj."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Kwōn kwalok cup ko im likūt er ilo shelf eo. Ālikin, kwōn kōmelimel kōjparok dren eo ioon tray."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Ne wōt rain eo ej bojrak, jikin eo enaj mōkaj in mōdry. Jikin kōjkoja ko reban bōk bwil eo elap."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Ilo jota, kitchen eo ear menono kin tea eo bwil. Pot eo dik ear pād iturin fire. Mweo ear kōmm̧an an mālie."
    sentence_count: 3
    license: "Project-owned"
    approved: true
