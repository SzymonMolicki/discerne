language: sun
texts:
  - content: "Naha sora hujan masih kadéngé tina hateup? Kuring nempatkeun gelas haneut di gigir jandéla. Di luar, daun baseuh nempel kana pager."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Abdi henteu hilap mareuman kompor. Bau sangu anyar masih karasa ti dapur leutik."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Beresihan meja heula, tuluy simpen sendok-sendokna kana laci. Ulah buru-buru, sabab lantaina masih baseuh."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Upami angin rada eureun, urang tiasa muka panto tukang. Karanjang baju bakal leuwih gancang garing."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Catetan pondok geus ditulis dina kertas konéng. Sanggeus kitu, kertasna diselapkeun kana buku leutik. Bau tinta masih karasa samar."
    sentence_count: 3
    license: "Project-owned"
    approved: true
