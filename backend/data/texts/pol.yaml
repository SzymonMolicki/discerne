language: pol
texts:
  - content: "Dlaczego ekran telefonu gaśnie tak szybko? Palec zostawia smużkę na szkle. W drugim pokoju bulgocze czajnik."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Nie pamiętałem hasła do małego sejfu. W środku leżały tylko guziki i stara wstążka."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Przesuń doniczkę bliżej światła i podlej ją ostrożnie. Potem wytrzyj mokry ślad z parapetu."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Gdyby pranie wyschło szybciej, spakowalibyśmy torbę jeszcze dziś. Wieczór byłby wtedy spokojniejszy i bez pośpiechu."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Na strychu pachniało kurzem i suszonymi jabłkami. Pod belką leżała płócienna torba. Zamek ustąpił dopiero po kilku próbach."
    sentence_count: 3
    license: "Project-owned"
    approved: true
