language: oss
texts:
  - content: "笑褘屑邪 褑褗忙褏 谢邪屑锌忙 褎忙蟹褘薪写懈 褉邪胁写懈褋谐忙 泻忙薪褘? 小褌褗芯谢褘谢 褉邪胁蟹忙褉写 泻褗忙屑褌褌忙 懈褋. 袟忙褏褏褘谢 褎忙谢屑忙薪 褏褍褘蟹 忙屑忙谢写."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "脝蟹 薪忙 褎械写褌芯薪 蟹忙褉芯薪写 泻谢褞褔褘 泻褗邪锌锌褘. 袛忙谢忙屑忙 忙褉褏忙褑褑忙 泻芯写褌邪 褑褗忙褏 薪忙谢谐芯泄屑邪谐."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "效邪褕泻忙褌忙 褎忙谢屑忙薪忙泄 薪褘褍褍邪写蟹 忙屑忙 锌芯谢泻忙屑忙 褎忙褋褌忙屑忙 忙褉忙胁忙褉. 校褘泄 褎忙褋褌忙 褋褌褗芯谢褘谢 写芯薪 褏忙褑褑忙 泻忙薪."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "袣忙写 蟹忙薪褏忙 斜邪褋褌 褍褘写蟹忙薪, 写胁芯褉 褉邪褍邪写蟹写蟹忙薪 褌邪谐褗写. 袣褗邪褏写蟹忙胁谐忙褌忙 褎褘谢写忙褉 谐褉褟蟹褜 薪忙 忙褉褑邪褏褋褘薪褑."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "袠蟹忙褉屑忙 泻褍褏芯薪忙泄褘 褏褗忙蟹写褘谐 褑邪泄褘 写褘屑谐忙 褍褘写. 袚褘褑褑褘谢 泻邪褋褌褉褞谢忙 锌谢懈褌忙泄褘谢 懈褋褌褘. 啸忙写蟹邪褉 褎忙谢屑忙薪忙泄 褋褍邪写蟹褘褉写."
    sentence_count: 3
    license: "Project-owned"
    approved: true
