language: bis
texts:
  - content: "From wanem smol laet i stap blink long rum? Wan buk i open long tebol. Win i pusum pepa i go klosap long doa."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Mi no faenem ol glas long shelf. Oli stap insaed long basket wetem wan drae kaliko."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Sapos ren i stop kwiktaem, rod bae i drae bifo naet. Ol sus bae oli no fulap long graon."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Ol plet oli wasem long wom wota. Biaen oli putum olgeta antap long klin taowel."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Long moning, ples blong kuk i smel olsem niu bred. Wan kap ti i stap hot yet. Evri samting i kwaet smol."
    sentence_count: 3
    license: "Project-owned"
    approved: true
