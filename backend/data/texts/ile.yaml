language: ile
texts:
  - content: "Pro quo li micri lampe trembla apu li fenestre? Un caderne sta apert sur li table. Li ride move se per un lent vent."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Yo ne trovat li old clave in li bux. Solmen un curt blanc fil restat intern."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Lava li tasses lentmen e mette les retro sur li planca. Pos to, sicca li aqua sur li plate."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Li mantel esset lavat ante li vésper. Poy it esset pendet apu li porta por siccar."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Matin li corridor odorat ye sabon e mint. Un parapluve restat apert in li angul. Omnicos devenit calm."
    sentence_count: 3
    license: "Project-owned"
    approved: true
