texts:
  - content: "¿Por qué la libreta tiene arena entre las páginas? Alguien la sacude sobre el suelo, y caen granos muy finos. La cubierta queda áspera al tacto."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "No encontré las gafas en la mesilla. Al final aparecieron dentro de una cesta de lana."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Barre el balcón antes de regar las macetas. Luego sacude la alfombra pequeña lejos de la puerta."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Si la persiana bajara mejor, la habitación estaría más fresca. La siesta sería más larga y tranquila."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "En el comedor olía a cáscara de naranja. Una servilleta doblada marcaba el sitio vacío. El vaso reflejaba una línea de sol."
    sentence_count: 3
