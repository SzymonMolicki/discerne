language: deu
texts:
  - content: "Weshalb summt die Lampe über dem Schreibtisch so leise? Die Mappen liegen sortiert, doch die Schatten zittern an der Wand. Im Flur riecht es nach warmer Farbe."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Das Paket kam nicht am Vormittag an. Die Nachbarin stellte die Pflanzen zurück ans Fenster und wartete weiter."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Wenn der Stoff dünner wäre, ließe sich der Mantel leichter flicken. Die Nähte würden fast unsichtbar bleiben."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Die leeren Flaschen wurden nach Farben sortiert. Danach wurde der Korb an die Wand geschoben, damit der Boden frei blieb."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Im Treppenhaus roch es nach nassem Stein. Eine Tasche stand neben dem Geländer. Von oben fiel warmes Licht auf die Stufen."
    sentence_count: 3
    license: "Project-owned"
    approved: true
