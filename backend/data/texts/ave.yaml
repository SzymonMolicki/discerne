texts:
  - content: "𐬐𐬆𐬭𐬆𐬥𐬀 𐬭𐬀𐬊𐬗𐬵𐬆 𐬀𐬙𐬀𐬭𐬆 𐬫𐬀𐬊𐬙𐬀? 𐬎𐬴𐬙𐬀 𐬀𐬵𐬨𐬀𐬌 𐬯𐬀𐬭𐬆 𐬛𐬀𐬵𐬌𐬙𐬌. 𐬀𐬯𐬨𐬀𐬥𐬆 𐬬𐬀𐬙𐬀 𐬨𐬀𐬌𐬥𐬌."
