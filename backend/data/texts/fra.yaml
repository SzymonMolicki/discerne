language: fra
texts:
  - content: "Pourquoi le miroir se couvre-t-il de buée si vite ? La salle est encore chaude, et la serviette glisse du crochet. Une goutte tombe dans le lavabo."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Je n'ai pas touché aux assiettes depuis ce matin. Pourtant, une trace de farine blanche restait sur la table."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Si la cour était moins bruyante, la lecture avancerait plus vite. Même les pages sembleraient tourner avec plus de douceur."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Les volets ont été repeints avant les premières chaleurs. Une couche claire a été choisie pour garder la chambre plus douce."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Dans un panier plat, des noix sèches craquaient sous les doigts. Une serviette bleue recouvrait le bol. Le goûter attendait sans bruit."
    sentence_count: 3
    license: "Project-owned"
    approved: true
