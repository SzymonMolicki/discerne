language: arb
texts:
  - content: "هل يكفي هذا الضوء لقراءة الرسالة الصغيرة؟ قرّب الرجل المصباح من الورقة، ثم عدّل نظارته بهدوء. في الخارج، هدأ صوت المطر."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "لم تصل رائحة القهوة إلى الغرفة الخلفية. بقي الباب مغلقًا، وكانت الأكواب تنتظر على الرف."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "اسحب الستارة قليلًا واترك النافذة مفتوحة. رتّب الوسائد على المقعد قبل أن يجلس الضيوف."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "تم غسل الأكواب الزجاجية في ماء فاتر. ثم وُضعت مقلوبة على منشفة نظيفة حتى تجف بهدوء."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "على الرف العالي تراكمت دفاتر قديمة. نفض العامل عنها الغبار ورتبها حسب الحجم. بعد قليل صار الممر أوسع."
    sentence_count: 3
    license: "Project-owned"
    approved: true
