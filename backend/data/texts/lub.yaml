language: lub
texts:
  - content: "Bishi nshi tshibasa tshia mashi tshidi mu kasanduku ka tshisuku? Diba dia tshisuku didi ditoka. Panshi padi biuma bikutakuta bibidi."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Kadi natuta tshilamba tshia kapia ku lubaya. Natsangana nansinga wa mukanda ukadi mukangame mu tshiseke."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Tula maluba makese mu dilonga, pashishe ukanga tshisanduku. Kusiya to dibue dia musenga pa buloba."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Bikale mukanda wakula musuekele, bana bavua ne bua kumona bifwanisu pashishe. Tshinyi tshidi munene tshivua tshia kupetwa kumpala."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Tshiseke tshia mabele tshakadi tshilongolodibwe ne bianza bitekete. Mabele makese akatupibwe mu tshibasa. Tshifukidilu tshakadi tshisangane ku luseke."
    sentence_count: 3
    license: "Project-owned"
    approved: true
