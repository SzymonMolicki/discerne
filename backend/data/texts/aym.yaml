language: aym
texts:
  - content: "Kunatsa jisk'a qhanaxa arumanakaxa jank'aki jiwt'i? Mesa patxan qillqata laphi jist'aratawa. Punku jak'ana thayaxa llamp'u sarnaqäna."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Janiw nayaxa ch'iyara phiskhu jikxatkti. Uka wayaqaxa q'ala utjawina ch'usaki qhiparäna."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Uma juk'aki apanim ukatxa phukhu jak'aru ucham. Qhipatxa amparama suma q'umacham."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Jallu t'aqxaspa ukhaxa, uta punkuxa jank'aki wañt'aspa. Wawanakana isisiñanakapaxa anqaru apasispawa."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Jayp'u pachana, nina jak'ana q'iru qiru q'aphiwa. Achunaka mä t'alpha manq'añaru uchatawa. Uta manqhana samarañaxa wali sumawa."
    sentence_count: 3
    license: "Project-owned"
    approved: true
