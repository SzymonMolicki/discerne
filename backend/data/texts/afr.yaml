language: afr
texts:
  - content: "Hoekom tik die vensterbank so sag in die wind? Die blare skuur teen die glas. Binne bly die mandjie met wasgoed halfvol."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Ek het nie die klein kwas in die blik gekry nie. Die verf was reeds droog, maar die tafel kon nog skoongemaak word."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Maak die laai stadig oop en tel die skroewe. Hou die lamp naby, want die hoek is donker."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "As die tou sterker was, sou die emmer makliker hang. Dan sou die water nie oor die rand spat nie."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Teen skemer het die werf na nat grond geruik. 'n Duidelike voetspoor was sigbaar in die sand. Die hek het stadig teruggeswaai."
    sentence_count: 3
    license: "Project-owned"
    approved: true
