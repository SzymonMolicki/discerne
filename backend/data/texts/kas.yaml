language: kas
texts:
  - content: "یہ چھوٚٹ لیمپ کھڑکی منز کٲہہ چمکان چھُ؟ میزس پؠٹھ کھولمُت کاغذ چھُ۔ پردہٕ ہلکے ہلکے ہلان چھُ۔"
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "مےٚ پرٲن کلید ڈبہٕ منز نہٕ لب۔ اندر صرف سفید دھاگُک ٹکُر اوس۔"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "پیالہٕ آرام سان دھوو تہٕ واپس شیلفس پؠٹھ تھاو۔ پتہٕ ٹرے پؠٹھ آبک نشان پونچھ۔"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "اگر بارش رُکِہ، صحن جلدی سُکِہ۔ جوتن پؠٹھ زِیادٕ کیچڑ نہٕ لگِہ۔"
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "شامس کچنس منز گرم چایہٕ خوشبوٗ اوس۔ چھوٚٹ دیگ چولس پؠٹھ اوس۔ گھر آہستہ آہستہ خاموش گژھ۔"
    sentence_count: 3
    license: "Project-owned"
    approved: true
