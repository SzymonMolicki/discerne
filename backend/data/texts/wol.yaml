language: wol
texts:
  - content: "Lu tax ndab lu ndaw li nekk ci wetu bunt bi? Suuf si set na ba pare. Ci kaw taabal bi, benn kayit bu weex lay tëdd."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Duma gis caabi bu mag bi ci biir boyet bi. Fi nekk rekk ay xaral yu ndaw lañu."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Raxas koopu yi ndànk te teg leen ci kaw serwet bu wow. Bul wacc ndox ci diggante bi."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Su taw bi noppee ci ngoon gi, mbubb mi dina wow gaaw. Dinañu ko denc ci armoor bi."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Xibaar bu gàtt bi bindees na ko ci kayit. Gannaaw loolu, kayit bi ñu laxas ko. Ñu dugal ko ci biir téere."
    sentence_count: 3
    license: "Project-owned"
    approved: true
