language: grn
texts:
  - content: "Mba'érepa pe tataindy michĩ oñembogue ha oñemyendy jey? Mesa ári oĩ kuatia ojepe'áva. Yvytu kangy oike ovetã rupi."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Ndajuhúi pe llave tuja cajón ryepýpe. Upépe opyta peteĩ ao pehẽngue morotĩnte."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Okýrõ opyta, tape pya'e ipirúta. Sapatu ndoguerahamo'ãi tuju hetaiterei."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Ka'aru jave, korapy tuicháva kirirĩme opyta. Peteĩ mba'yru yvoty rehegua oĩ okẽ ypýpe."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Koty ryepýpe ojehendu y tyapu kangy. Tatakua rembe'ýpe oĩ mbujape haku. Opavave oñe'ẽ mbegue."
    sentence_count: 3
    license: "Project-owned"
    approved: true
