language: que
texts:
  - content: "Imaraykutaq huch'uy k'anchayqa ventanapi ch'ipyan? Qillqana p'anqa mesapi kichasqa kachkan. Lliklla allillamanta kuyurin."
    sentence_count: 3
    license: "Project-owned"
    approved: true
  - content: "Mana ñawpa llave-ta cajapi tarirqanichu. Ukhupiqa huk yuraq watucha sapallan qhiparqan."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Qirukunata allillamanta mayllay, chaymanta estante-man kutichiy. Qhipata bandeja-pi yaku unanchata pichay."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Para sayk'uptinqa, patioqa utqaylla ch'akinqa. Zapatoqa mana achka mit'uta apaykunqachu."
    sentence_count: 2
    license: "Project-owned"
    approved: true
  - content: "Ch'isiyaqta, wayk'una wasiqa ruphaq mate-ta muskirqan. Huch'uy manka nina qayllapi kasharqan. Wasiqa allillamanta upallalla karqan."
    sentence_count: 3
    license: "Project-owned"
    approved: true
